<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
</head>

<body>

    <h1>Rock Paper Scissors</h1>

    <div class="game-container">
        <p>Select your move:</p>

        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>

        <div class="display">
            <p>User Choice: <span id="user-move">-</span></p>
            <p>Computer Choice: <span id="computer-move">-</span></p>
            <p>Result: <strong id="game-result">Pending...</strong></p>
        </div>

        <div class="score-board">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>
    </div>

</body>

</html>
