<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors ⚔️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title"><i class="fas fa-hand-fist"></i> Rock Paper Scissors</h1>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Game Stats -->
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Wins</span>
                <span class="stat-value" id="playerScore">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Draws</span>
                <span class="stat-value" id="draws">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Losses</span>
                <span class="stat-value" id="computerScore">0</span>
            </div>
        </div>

        <!-- Game Area -->
        <main class="game-area">
            <!-- Player Choice -->
            <div class="choice-area">
                <div class="choice player-choice">
                    <h3>Your Choice</h3>
                    <div class="choice-display" id="playerChoice">
                        <i class="fas fa-hand-paper choice-icon"></i>
                    </div>
                </div>

                <!-- Result -->
                <div class="result-area">
                    <div class="result-text" id="resultText">Choose your move!</div>
                    <div class="score-display" id="roundResult"></div>
                </div>

                <!-- Computer Choice -->
                <div class="choice computer-choice">
                    <h3>Computer</h3>
                    <div class="choice-display" id="computerChoice">
                        <i class="fas fa-hand-paper choice-icon"></i>
                    </div>
                </div>
            </div>

            <!-- Choices Buttons -->
            <div class="choices-grid" id="choicesGrid">
                <button class="choice-btn" data-choice="rock" title="Rock">
                    <i class="fas fa-hand-back-fist"></i>
                    <span>Rock</span>
                </button>
                <button class="choice-btn" data-choice="paper" title="Paper">
                    <i class="fas fa-hand-paper"></i>
                    <span>Paper</span>
                </button>
                <button class="choice-btn" data-choice="scissors" title="Scissors">
                    <i class="fas fa-hand-scissors"></i>
                    <span>Scissors</span>
                </button>
            </div>
        </main>

        <!-- Reset Button -->
        <button class="reset-btn" id="resetBtn">
            <i class="fas fa-redo"></i> New Game
        </button>

        <!-- Win Modal -->
        <div class="modal" id="winModal">
            <div class="modal-content">
                <h2>🎉 Victory! 🎉</h2>
                <p>You won the game!</p>
                <button class="modal-btn" id="playAgain">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Connect CSS and JS -->
    <script src="script.js" defer></script>
</body>
</html>
